[project]
name = "pleno-ner-training"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "spacy[ja]>=3.8",
    "spacy-transformers>=1.3",
    "openai>=1.0.0",
    "jinja2>=3.1",
    "tqdm>=4.66",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pleno_ner_training"]
